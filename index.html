<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentNin Android App</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0c2340;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;

            letter-spacing: 1px;
        }

</head>
<body>
    <div class="badge">Android Native App</div>
    <h1>RentNin is Ready</h1>
    <p>This project has been fully rewritten as a native Android application in Kotlin and Jetpack Compose. All source code, Gradle configurations, and Room schemas reside in the <strong>/app</strong> folder.</p>
